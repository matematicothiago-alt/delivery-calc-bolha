version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01
    environment:
      ANDROID_HOME: /opt/android/sdk
    steps:
      - checkout
      - run:
          name: Dar permissão pro gradlew
          command: chmod +x gradlew
      - run:
          name: Build Debug APK
          command: ./gradlew assembleDebug --no-daemon --stacktrace -x lint

workflows:
  build-workflow:
    jobs:
      - build
