version: 2.1
jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - checkout
      - run:
          name: Dar permissão e rodar
          command: |
            unset JAVA_TOOL_OPTIONS
            unset GRADLE_OPTS
            chmod +x ./gradlew
            ./gradlew check
workflows:
  build:
    jobs:
      - build
