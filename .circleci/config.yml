version: 2.1
jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
    environment:
      JAVA_TOOL_OPTIONS: 
      GRADLE_OPTS: 
    steps:
      - checkout
      - run:
          name: Dar permissão e rodar
          command: |
            chmod +x ./gradlew
            ./gradlew check
workflows:
  build:
    jobs:
      - build
