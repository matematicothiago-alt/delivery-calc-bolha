version: 2.1

jobs:
  build:
    docker:
      - image: cimg/android:2024.01
    steps:
      - checkout
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug --no-daemon
      - store_artifacts:
          path: app/build/outputs/apk/debug
          destination: apk

workflows:
  build:
    jobs:
      - build
